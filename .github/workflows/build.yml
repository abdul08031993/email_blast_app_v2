name: Build & Release Email Blast Pro

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest
    timeout-minutes: 60 # Ditambah jadi 60 menit agar tidak timeout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # Update ke Node 24
          cache: 'npm'
      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      - name: Build Windows
        run: npm run dist-win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  build-linux:
    name: 🐧 Linux Build
    runs-on: ubuntu-latest
    timeout-minutes: 60 # Ditambah jadi 60 menit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24' # Update ke Node 24
          cache: 'npm'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2t64
      - name: Install dependencies
        run: npm install --no-audit --no-fund
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'
      - name: Build Linux
        run: npm run dist-linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  # macOS kita matikan sementara agar kamu tidak menunggu 1 jam
  # Kalau Windows & Linux sudah berhasil, baru kita aktifkan lagi
  # build-macos: ... (dihapus/dikomentari dulu)

  release:
    name: 🚀 Buat GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: "Email Blast Pro ${{ github.ref_name }}"
          files: release-files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
