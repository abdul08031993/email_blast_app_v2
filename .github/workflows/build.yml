name: Build & Release Email Blast Pro

on:
  push:
    tags:
      - 'v*'          # Trigger saat push tag seperti v1.0.0, v1.2.3
  workflow_dispatch:   # Bisa juga dijalankan manual dari GitHub UI

permissions:
  contents: write      # Diperlukan untuk membuat Release dan upload aset

jobs:
  # ===================== BUILD WINDOWS =====================
  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (.exe)
        run: npm run dist-win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 7

  # ===================== BUILD MACOS =====================
  build-macos:
    name: 🍎 macOS Build
    runs-on: macos-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (.dmg)
        run: npm run dist-mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Jika punya Apple Developer certificate, tambahkan secrets berikut:
          # CSC_LINK: ${{ secrets.MAC_CERT_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}

      - name: Upload artifact macOS
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          retention-days: 7

  # ===================== BUILD LINUX =====================
  build-linux:
    name: 🐧 Linux Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2

      - name: Install dependencies
        run: npm ci

      - name: Build Linux (.AppImage & .deb)
        run: npm run dist-linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          retention-days: 7

      - name: Upload artifact Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb
          retention-days: 7

  # ===================== CREATE GITHUB RELEASE =====================
  release:
    name: 🚀 Buat GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download semua artifact
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Buat Release dan Upload File
        uses: softprops/action-gh-release@v2
        with:
          name: "Email Blast Pro ${{ github.ref_name }}"
          body: |
            ## 📧 Email Blast Pro ${{ github.ref_name }}

            ### Download sesuai sistem operasi kamu:
            | OS | File |
            |---|---|
            | 🪟 Windows | `*-Setup.exe` |
            | 🍎 macOS | `*.dmg` |
            | 🐧 Linux | `*.AppImage` atau `*.deb` |

            ### Cara Install:
            - **Windows**: Jalankan file `.exe`, ikuti wizard instalasi
            - **macOS**: Buka file `.dmg`, drag ke Applications
            - **Linux AppImage**: `chmod +x *.AppImage && ./Email-Blast-Pro*.AppImage`
            - **Linux DEB**: `sudo dpkg -i *.deb`
          files: release-files/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}