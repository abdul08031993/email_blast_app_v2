name: Build & Release Email Blast Pro

on:
  push:
    tags:
      - 'v*'          # Trigger otomatis saat push tag (contoh: v1.0.1)
  workflow_dispatch:   # Tombol manual di tab Actions GitHub

permissions:
  contents: write      # Izin untuk membuat halaman Release

jobs:
  # ===================== BUILD WINDOWS =====================
  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Build Windows installer (.exe)
        run: npm run dist-win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          retention-days: 7

  # ===================== BUILD MACOS =====================
  build-macos:
    name: 🍎 macOS Build
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Build macOS (.dmg)
        run: npm run dist-mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact macOS
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          retention-days: 7

  # ===================== BUILD LINUX =====================
  build-linux:
    name: 🐧 Linux Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies
        # FIX: Menggunakan libasound2t64 untuk Ubuntu 24.04 (Noble)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2t64

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 'true'

      - name: Build Linux (.AppImage & .deb)
        run: npm run dist-linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          retention-days: 7

      - name: Upload artifact Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb
          retention-days: 7

  # ===================== CREATE GITHUB RELEASE =====================
  release:
    name: 🚀 Buat GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download semua artifact
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: Buat Release dan Upload File
        uses: softprops/action-gh-release@v2
        with:
          name: "Email Blast Pro ${{ github.ref_name }}"
          body: |
            ## 📧 Email Blast Pro ${{ github.ref_name }}
            
            Silakan download installer sesuai OS kamu di bawah ini.
          files: release-files/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
