name: Build & Release Email Blast Pro

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ===================== BUILD WINDOWS =====================
  build-windows:
    name: 🪟 Windows Build
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Build Windows
        run: npm run dist-win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

  # ===================== BUILD MACOS =====================
  build-macos:
    name: 🍎 macOS Build
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        # Ini kunci agar macOS tidak macet 50 menit lagi
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Build macOS (.dmg)
        run: npm run dist-mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

  # ===================== BUILD LINUX =====================
  build-linux:
    name: 🐧 Linux Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libnss3 libatk-bridge2.0-0 libgtk-3-0 libxss1 libasound2t64
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Build Linux
        run: npm run dist-linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            dist/*.AppImage
            dist/*.deb

  # ===================== CREATE GITHUB RELEASE =====================
  release:
    name: 🚀 Buat GitHub Release
    # Menunggu ketiga build (Win, Mac, Linux) selesai dulu
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          name: "Email Blast Pro ${{ github.ref_name }}"
          body: |
            ## 📧 Email Blast Pro ${{ github.ref_name }}
            Berhasil di-build untuk Windows, macOS, dan Linux.
          files: release-files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
